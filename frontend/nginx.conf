server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas redirigen a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estaticos (JS, CSS, imagenes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cachear index.html (para que siempre cargue la ultima version)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Health check para Azure Container Apps
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Deshabilitar acceso a archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
